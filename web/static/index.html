<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>AI Wargame</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
  fieldset { margin-bottom: 1.5rem; }
  .agent-row { border: 1px solid #ccc; padding: 0.75rem; margin-bottom: 0.75rem; border-radius: 6px; }
  label { display: block; font-weight: bold; margin-top: 0.5rem; }
  input[type=text], input[type=number], input[type=password], textarea { width: 100%; box-sizing: border-box; padding: 0.4rem; margin-top: 0.2rem; }
  textarea { min-height: 3.5rem; }
  button { margin-top: 0.5rem; padding: 0.5rem 1rem; cursor: pointer; }
  #status { margin-top: 1rem; font-weight: bold; }
  #status.error { color: #b00020; }
  .turn { border-top: 2px solid #333; padding-top: 0.75rem; margin-top: 1.5rem; }
  .action { margin: 0.5rem 0; }
</style>
</head>
<body>

<h1>AI Wargame</h1>

<form id="game-form">
  <fieldset>
    <legend>Agents</legend>
    <div id="agents"></div>
    <button type="button" id="add-agent">+ Add agent</button>
  </fieldset>

  <fieldset>
    <legend>Judge</legend>
    <label>Model (OpenRouter slug, e.g. anthropic/claude-3.5-sonnet)</label>
    <input type="text" id="judge-model" value="anthropic/claude-3.5-sonnet" />
    <label>Context (background info to ground the judge's rulings)</label>
    <textarea id="judge-context"></textarea>
  </fieldset>

  <fieldset>
    <legend>Game</legend>
    <label>Starting scenario</label>
    <textarea id="scenario"></textarea>
    <label>Number of turns</label>
    <input type="number" id="num-turns" value="5" min="1" />
    <label>OpenRouter API key</label>
    <input type="password" id="api-key" placeholder="sk-or-..." />
  </fieldset>

  <button type="submit">Run game</button>
</form>

<div id="status"></div>
<div id="results"></div>

<template id="agent-row-template">
  <div class="agent-row">
    <label>Name</label>
    <input type="text" class="agent-name" placeholder="e.g. Poultry Integrator" />
    <label>Objective</label>
    <textarea class="agent-objective" placeholder="What does this agent want?"></textarea>
    <label>Model (OpenRouter slug)</label>
    <input type="text" class="agent-model" placeholder="e.g. anthropic/claude-3.5-sonnet" />
    <button type="button" class="remove-agent">Remove</button>
  </div>
</template>

<script>
const agentsContainer = document.getElementById("agents");
const agentRowTemplate = document.getElementById("agent-row-template");

function addAgentRow() {
  const row = agentRowTemplate.content.cloneNode(true);
  row.querySelector(".remove-agent").addEventListener("click", (e) => {
    e.target.closest(".agent-row").remove();
  });
  agentsContainer.appendChild(row);
}

document.getElementById("add-agent").addEventListener("click", addAgentRow);

// Start with 2 agent rows so the form isn't empty on first load.
addAgentRow();
addAgentRow();

function collectAgents() {
  return [...agentsContainer.querySelectorAll(".agent-row")].map((row) => ({
    name: row.querySelector(".agent-name").value,
    objective: row.querySelector(".agent-objective").value,
    model: row.querySelector(".agent-model").value,
  }));
}

function renderResults(turns) {
  const resultsEl = document.getElementById("results");
  resultsEl.innerHTML = "";
  for (const turn of turns) {
    const turnEl = document.createElement("div");
    turnEl.className = "turn";
    let html = `<h3>Turn ${turn.turn_number}</h3><p><strong>Situation:</strong> ${turn.situation}</p>`;
    for (const [name, action] of Object.entries(turn.actions)) {
      html += `<p class="action"><strong>${name}:</strong> ${action}</p>`;
    }
    html += `<p><strong>Outcome:</strong> ${turn.summary}</p>`;
    turnEl.innerHTML = html;
    resultsEl.appendChild(turnEl);
  }
}

document.getElementById("game-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const statusEl = document.getElementById("status");
  const submitButton = e.target.querySelector("button[type=submit]");

  const body = {
    agents: collectAgents(),
    judge: {
      model: document.getElementById("judge-model").value,
      context: document.getElementById("judge-context").value,
    },
    scenario: document.getElementById("scenario").value,
    num_turns: parseInt(document.getElementById("num-turns").value, 10),
    openrouter_api_key: document.getElementById("api-key").value,
  };

  statusEl.className = "";
  statusEl.textContent = "Running... this can take a while for more agents/turns.";
  document.getElementById("results").innerHTML = "";
  submitButton.disabled = true;

  try {
    const response = await fetch("/api/run", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    const data = await response.json();

    if (!response.ok) {
      throw new Error(data.detail || "Something went wrong.");
    }

    statusEl.textContent = "Done.";
    renderResults(data);
  } catch (err) {
    statusEl.className = "error";
    statusEl.textContent = "Error: " + err.message;
  } finally {
    submitButton.disabled = false;
  }
});
</script>

</body>
</html>
